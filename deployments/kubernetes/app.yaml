apiVersion: v1
kind: ConfigMap
metadata:
  name: crm-config
data:
  APP_ENV: production
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: crm
  POSTGRES_DB: crm
  POSTGRES_SSLMODE: disable
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BROKERS: kafka:9092
  JWT_ISSUER: event-driven-crm
  LEAD_SERVICE_URL: http://lead-service:8081
  CUSTOMER_SERVICE_URL: http://customer-service:8082
  NOTIFICATION_SERVICE_URL: http://notification-service:8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: event-driven-crm/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: crm-config
            - secretRef:
                name: crm-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lead-service
  template:
    metadata:
      labels:
        app: lead-service
    spec:
      containers:
        - name: lead-service
          image: event-driven-crm/lead-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: crm-config
            - secretRef:
                name: crm-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: lead-service
spec:
  selector:
    app: lead-service
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: event-driven-crm/customer-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: crm-config
            - secretRef:
                name: crm-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
spec:
  selector:
    app: customer-service
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: event-driven-crm/notification-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: crm-config
            - secretRef:
                name: crm-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 8083
      targetPort: 8083

