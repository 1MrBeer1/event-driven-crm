services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9094"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  migrate:
    image: postgres:16-alpine
    volumes:
      - ./migrations:/migrations:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-crm}
    command: >
      sh -c "psql -h postgres -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm} -v ON_ERROR_STOP=1 -f /migrations/001_init.sql"
    depends_on:
      postgres:
        condition: service_healthy

  lead-service:
    build:
      context: .
      dockerfile: deployments/docker/lead-service/Dockerfile
    environment: &app-env
      APP_ENV: local
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ISSUER: event-driven-crm
    ports:
      - "8081:8081"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  customer-service:
    build:
      context: .
      dockerfile: deployments/docker/customer-service/Dockerfile
    environment:
      <<: *app-env
    ports:
      - "8082:8082"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: deployments/docker/notification-service/Dockerfile
    environment:
      <<: *app-env
    ports:
      - "8083:8083"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: deployments/docker/gateway/Dockerfile
    environment:
      <<: *app-env
      LEAD_SERVICE_URL: http://lead-service:8081
      CUSTOMER_SERVICE_URL: http://customer-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
    ports:
      - "8080:8080"
    depends_on:
      lead-service:
        condition: service_started
      customer-service:
        condition: service_started
      notification-service:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: deployments/docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres-data:
