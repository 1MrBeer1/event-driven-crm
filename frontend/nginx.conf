server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /auth/ {
        proxy_pass http://gateway:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://gateway:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /gateway/ {
        proxy_pass http://gateway:8080/;
        proxy_set_header Host $host;
    }

    location /lead-service/ {
        proxy_pass http://lead-service:8081/;
        proxy_set_header Host $host;
    }

    location /customer-service/ {
        proxy_pass http://customer-service:8082/;
        proxy_set_header Host $host;
    }

    location /notification-service/ {
        proxy_pass http://notification-service:8083/;
        proxy_set_header Host $host;
    }
}

